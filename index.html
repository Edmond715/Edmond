<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pro Vision Ug</title>
    <style>
        body {
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            margin: 0;
            padding: 0;
            background-color: #f4f4f4;
            color: #333;
            padding-bottom: 100px;
        }
        header {
            background-color: #1a1a1a;
            color: #ffcc00;
            padding: 40px 20px;
            text-align: center;
            border-bottom: 4px solid #ffcc00;
        }
        header h1 { margin: 0; font-size: 3rem; text-transform: uppercase; letter-spacing: 2px; }
        header p.author { color: #fff; font-style: italic; margin-top: 10px; font-size: 1.2rem; }
        
        nav {
            background-color: #333;
            padding: 15px;
            text-align: center;
            position: sticky;
            top: 0;
            z-index: 100;
        }
        nav a {
            color: white;
            margin: 0 15px;
            text-decoration: none;
            font-weight: bold;
            transition: 0.3s;
        }
        nav a:hover { color: #ffcc00; }

        section {
            padding: 25px;
            margin: 20px auto;
            max-width: 800px;
            background-color: white;
            border-radius: 12px;
            box-shadow: 0 4px 15px rgba(0,0,0,0.1);
        }
        h2 { border-bottom: 2px solid #ffcc00; padding-bottom: 10px; color: #1a1a1a; }
        
        .download-list { list-style: none; padding: 0; }
        .download-list li {
            margin: 10px 0;
            padding: 15px;
            background-color: #f9f9f9;
            border-radius: 8px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            border: 1px solid #eee;
        }
        .btn {
            padding: 10px 18px;
            text-decoration: none;
            border-radius: 6px;
            font-weight: bold;
            cursor: pointer;
            border: none;
            transition: 0.3s;
            display: inline-block;
        }
        .download-btn { background-color: #ffcc00; color: #111; }
        .youtube-btn { background-color: #ff0000; color: white; margin-top: 10px; }
        .download-btn:hover { background-color: #e6b800; }
        .youtube-btn:hover { background-color: #cc0000; }

        .video-container {
            position: relative;
            padding-bottom: 56.25%;
            height: 0;
            overflow: hidden;
            border-radius: 8px;
            background: #000;
        }
        .video-container iframe {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            border: 0;
        }

        footer {
            background-color: #1a1a1a;
            color: #ccc;
            text-align: center;
            padding: 20px;
            position: fixed;
            bottom: 0;
            width: 100%;
            font-size: 0.9rem;
            z-index: 100;
        }
    </style>
</head>
<body>

    <header>
        <h1>Pro Vision Ug</h1>
        <p class="author">By Author: MTE Eddie</p>
    </header>

    <nav>
        <a href="#movies">Movies</a>
        <a href="#audio">Audio</a>
        <a href="#notes">Notes</a>
        <a href="#youtube">YouTube</a>
    </nav>

    <section id="movies">
        <h2>Movies</h2>
        <ul class="download-list">
            <li>
                <span>Example Movie (MP4)</span>
                <a href="movies/file.mp4" download class="btn download-btn">Download</a>
            </li>
        </ul>
    </section>

    <section id="audio">
        <h2>Audio MP3</h2>
        <ul class="download-list">
            <li>
                <span>Example Song (MP3)</span>
                <a href="audio/file.mp3" download class="btn download-btn">Download</a>
            </li>
        </ul>
    </section>

    <section id="notes">
        <h2>Reading Notes</h2>
        <ul class="download-list">
            <li>
                <span>Example Notes (PDF)</span>
                <a href="notes/file.pdf" download class="btn download-btn">Download</a>
            </li>
        </ul>
    </section>

    <section id="youtube">
        <h2>YouTube Channel</h2>
        <div class="video-container">
            <iframe src="https://www.youtube.com/embed/VIDEO_ID" allowfullscreen></iframe>
        </div>
        <div style="text-align: center;">
            <a href="https://www.youtube.com/@YOUR_CHANNEL" target="_blank" class="btn youtube-btn">Subscribe to MTE Eddie</a>
        </div>
    </section>

    <footer>
        <p>&copy; 2026 <strong>Pro Vision Ug</strong> | Created by MTE Eddie</p>
    </footer>

</body>
</html>
